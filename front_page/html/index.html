<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 知识枢纽核心</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="checkAuthAndInit()">

    <div class="sidebar" id="sidebar">
        <div class="nav-item active menu-item" onclick="switchTab('knowledge', this)">
            <i>📚</i><span>知识大厅</span>
        </div>
        <div class="nav-item menu-item" onclick="switchTab('profile', this)">
            <i>👤</i><span>个人中心</span>
        </div>
        <div class="spacer"></div>
        <div class="nav-item logout-btn" onclick="logout()">
            <i>🚪</i><span>退出登录</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="main-header-title">✨ 知识枢纽矩阵</h1>
            <div class="user-profile">
                <span>👋 欢迎，<strong id="current-username">User</strong></span>
            </div>
        </div>

        <div id="category-filter" class="category-bar" style="padding: 10px 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            </div>

        <div id="content-container" style="padding: 20px; display: flex; flex-wrap: wrap; gap: 20px;">
            <div id="article-list"></div>
        </div>
    </div>

    <div id="ai-toggle-btn" onclick="toggleAiPanel()" title="唤醒 Dify 助手">
        🤖
    </div>

    <div id="ai-panel" style="display: none;">
        <div class="ai-header" id="ai-drag-handle">
            <span>🤖 Dify 智能终端</span>
            <span class="close-ai-btn" onclick="toggleAiPanel()">✖</span>
        </div>
        <div class="ai-chat-box" id="chat-box">
            <div class="msg ai">你好！我是你的专属 AI 助手。遇到不懂的知识随时问我，或者直接让我总结文章哦～</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="输入你想问的问题...">
            <button onclick="sendChatMessage()">发送</button>
        </div>
    </div>

    <script src="../js/app.js"></script>
<div id="article-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; width: 60%; max-width: 800px; height: 80%; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden;">
            <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
                <h2 id="modal-article-title" style="margin: 0; font-size: 18px; color: #1f2937;">加载中...</h2>
                <span style="cursor: pointer; font-size: 20px; color: #9ca3af;" onclick="closeArticleModal()">✖</span>
            </div>

            <div id="modal-article-content" style="flex: 1; padding: 20px; overflow-y: auto; line-height: 1.8; color: #374151; font-size: 15px;">
                正在拼命加载文章内容...
            </div>

            <div style="padding: 15px 20px; border-top: 1px solid #eee; background: #fafafa;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button class="btn" style="background: #8b5cf6;" onclick="triggerSummarize()">🤖 召唤 AI 总结这篇</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <textarea id="new-note-input" placeholder="边看边记，写下你的灵感笔记..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; height: 50px; resize: none; font-family: inherit;"></textarea>
                    <button class="btn" style="height: 50px; flex-shrink: 0;" onclick="submitNote()">💾 保存笔记</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
