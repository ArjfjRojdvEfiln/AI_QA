<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能知识库与AI问答系统</title>
    <style>
        /* ================= 现代化 CSS 样式 ================= */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- 认证页面 (登录/注册) --- */
        #auth-view {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
        }
        .auth-card {
            background: var(--surface-color); padding: 40px; border-radius: var(--radius);
            box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center;
        }
        .auth-card h2 { margin-bottom: 24px; color: var(--primary-color); }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-muted); }
        .input-group input {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border-color);
            border-radius: 8px; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn {
            width: 100%; padding: 12px; background: var(--primary-color); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .toggle-auth { margin-top: 16px; font-size: 14px; color: var(--text-muted); cursor: pointer; }
        .toggle-auth span { color: var(--primary-color); font-weight: 500; }

        /* --- 主控制台布局 --- */
        #main-view { display: none; height: 100vh; display: flex; }

        /* 侧边栏 */
        .sidebar {
            width: 260px; background: var(--surface-color); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 20px 0;
        }
        .logo { padding: 0 20px 20px; font-size: 18px; font-weight: bold; color: var(--primary-color); border-bottom: 1px solid var(--border-color); margin-bottom: 10px;}
        .menu-item {
            padding: 12px 20px; margin: 4px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-main); transition: 0.2s; display: flex; align-items: center;
        }
        .menu-item:hover, .menu-item.active { background: #eff6ff; color: var(--primary-color); font-weight: 500; }
        .user-info { margin-top: auto; padding: 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;}

        /* 中间内容区 (知识库) */
        .content-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); }
        .header { padding: 20px; background: var(--surface-color); border-bottom: 1px solid var(--border-color); box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 10;}
        .header-title { font-size: 20px; font-weight: bold; }
        .main-scroll { flex: 1; padding: 24px; overflow-y: auto; }

        .article-card {
            background: var(--surface-color); padding: 20px; border-radius: var(--radius);
            box-shadow: var(--shadow); margin-bottom: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .article-card:hover { transform: translateY(-2px); border-color: var(--primary-color); }
        .article-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .article-meta { font-size: 12px; color: var(--text-muted); }

        /* 右侧 AI 助手区 */
        .ai-panel {
            width: 320px; background: var(--surface-color); border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column;
        }
        .ai-header { padding: 20px; border-bottom: 1px solid var(--border-color); font-weight: bold; background: linear-gradient(to right, #eff6ff, #ffffff); }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #fafaf9; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg.user { background: var(--primary-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px;}
        .msg.ai { background: white; color: var(--text-main); border: 1px solid var(--border-color); align-self: flex-start; border-bottom-left-radius: 2px; }
        .ai-input-area { padding: 16px; border-top: 1px solid var(--border-color); background: white; }
        .ai-input-area textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; resize: none; outline: none; margin-bottom: 8px;}

        /* 吐司提示 (Toast) */
        #toast {
            position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 12px 24px;
            border-radius: 8px; box-shadow: var(--shadow); transition: 0.3s; opacity: 0; pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="toast">提示消息</div>

    <div id="auth-view">
        <div class="auth-card">
            <h2 id="auth-title">欢迎登录</h2>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn" id="auth-btn" onclick="handleAuth()">登 录</button>
            <div class="toggle-auth" onclick="toggleAuthMode()">
                <span id="auth-switch-text">没有账号？点击注册</span>
            </div>
        </div>
    </div>

    <div id="main-view">
        <aside class="sidebar">
            <div class="logo">🚀 AI 知识库系统</div>
            <div class="menu-item active" onclick="switchTab('knowledge', this)">📚 知识探索</div>
            <div class="menu-item" onclick="switchTab('notes', this)">📝 我的笔记</div>
            <div class="menu-item" onclick="switchTab('history', this)">🕒 浏览历史</div>
            <div class="menu-item" onclick="switchTab('feedback', this)">💡 智能反馈</div>

            <div class="user-info">
                <span id="current-username" style="font-weight: bold; color: var(--primary-color);">User</span>
                <button onclick="logout()" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px;">退出</button>
            </div>
        </aside>

        <main class="content-area">
            <header class="header">
                <div class="header-title" id="main-header-title">所有文章</div>
            </header>
            <div class="main-scroll" id="content-container">
                <div style="text-align: center; color: #9ca3af; margin-top: 50px;">正在加载数据...</div>
            </div>
        </main>

        <aside class="ai-panel">
            <div class="ai-header">🤖 Dify 智能助手</div>
            <div class="chat-box" id="chat-box">
                <div class="msg ai">你好！我是你的专属学习助手，有什么专业问题都可以问我哦，或者点击左侧文章让我帮你总结。</div>
            </div>
            <div class="ai-input-area">
                <textarea id="ai-input" placeholder="输入问题，按回车发送..."></textarea>
                <button class="btn" onclick="sendChatMessage()">发送请求</button>
            </div>
        </aside>
    </div>

    <script>
        // ================= 后端接口配置 =================
        const API_BASE = "http://127.0.0.1:9991";
        let isLoginMode = true;

        // ================= 工具函数 =================
        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 3000);
        }

        // 核心 HTTP 请求封装（自动带 Token，自动拦截统一格式）
        async function fetchAPI(endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
                // 拦截 HTTP 层面的错误（如 401 身份过期）
                if (response.status === 401) {
                    showToast('登录已过期，请重新登录', 'error');
                    logout();
                    return null;
                }
                const resData = await response.json();

                // 拦截业务层面的错误 (根据你们的 response.py 封装)
                if (resData.code && resData.code !== 200) {
                    showToast(resData.msg || '请求失败', 'error');
                    return null;
                }
                return resData; // 成功时返回完整响应
            } catch (err) {
                console.error("网络请求错误:", err);
                showToast("网络连接异常，请检查后端服务是否启动", "error");
                return null;
            }
        }

        // ================= 认证模块 =================
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? '欢迎登录' : '注册新账号';
            document.getElementById('auth-btn').innerText = isLoginMode ? '登 录' : '注 册';
            document.getElementById('auth-switch-text').innerText = isLoginMode ? '没有账号？点击注册' : '已有账号？点击登录';
        }

        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return showToast("请输入用户名和密码", "error");

            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
            const res = await fetchAPI(endpoint, {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            if (res && res.code === 200) {
                if (isLoginMode) {
                    // 登录成功
                    localStorage.setItem('token', res.data.access_token);
                    localStorage.setItem('username', username);
                    showToast("登录成功！");
                    checkAuthAndInit();
                } else {
                    // 注册成功，自动切换到登录
                    showToast("注册成功，请登录");
                    toggleAuthMode();
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            document.getElementById('auth-view').style.display = 'flex';
            document.getElementById('main-view').style.display = 'none';
        }

        // ================= 页面初始化与路由 =================
        function checkAuthAndInit() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'flex';
                document.getElementById('current-username').innerText = localStorage.getItem('username');
                loadArticles(); // 默认加载知识库
            } else {
                document.getElementById('auth-view').style.display = 'flex';
                document.getElementById('main-view').style.display = 'none';
            }
        }

        function switchTab(tabName, element) {
            // 样式切换
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const titleObj = { 'knowledge': '知识库', 'notes': '我的笔记', 'history': '浏览历史', 'feedback': '智能反馈' };
            document.getElementById('main-header-title').innerText = titleObj[tabName];

            // 根据Tab加载数据
            if(tabName === 'knowledge') loadArticles();
            else if(tabName === 'history') loadHistory();
            else document.getElementById('content-container').innerHTML = '<div style="text-align:center;color:#9ca3af;margin-top:50px;">该功能模块前端正在开发中...</div>';
        }

        // ================= 业务功能 (数据加载) =================

        // 加载文章列表
        async function loadArticles() {
            const container = document.getElementById('content-container');
            container.innerHTML = '加载中...';

            const res = await fetchAPI('/api/articles?page=1&size=20', { method: 'GET' });
            if (res && res.data) {
                // 如果你们的 data 里有 items，就用 res.data.items，如果直接是数组就用 res.data
                const list = res.data.items || res.data;
                if (list.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#9ca3af;margin-top:50px;">暂无内容，请在后端添加测试数据</div>';
                    return;
                }

                let html = '';
                list.forEach(article => {
                    html += `
                        <div class="article-card" onclick="summarizeArticle(${article.id}, '${article.title}')">
                            <div class="article-title">${article.title}</div>
                            <div class="article-meta">分类 ID: ${article.category_id || '未分类'} </div>
                            <div style="margin-top: 10px; font-size: 14px; color: #4b5563;">
                                ${article.content ? article.content.substring(0, 100) + '...' : '暂无内容简介'}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
        }

        // 加载历史记录
        async function loadHistory() {
            const container = document.getElementById('content-container');
            const res = await fetchAPI('/api/user/history?page=1&size=20', { method: 'GET' });
            if (res && res.data) {
                let html = '';
                const list = res.data.items || res.data;
                list.forEach(item => {
                    html += `<div class="article-card">
                        <div class="article-title">${item.title || '未知文章'}</div>
                        <div class="article-meta">浏览时间: ${new Date(item.created_at).toLocaleString()}</div>
                    </div>`;
                });
                container.innerHTML = html || '<div style="text-align:center;margin-top:50px;">暂无浏览记录</div>';
            }
        }

        // ================= AI 交互 =================

        // 渲染对话气泡
        function appendMessage(role, text) {
            const box = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            msgDiv.innerText = text;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        // 点击文章卡片，触发 Dify 总结
        async function summarizeArticle(id, title) {
            appendMessage('user', `请帮我总结一下文章：《${title}》`);
            appendMessage('ai', `正在努力阅读并总结文章，请稍等...`);

            // 调用你的单篇总结接口
            const res = await fetchAPI('/api/ai/summarize', {
                method: 'POST',
                body: JSON.stringify({ document_id: String(id) })
            });

            if (res && res.data) {
                // 覆盖上一条“正在努力...”的消息
                const msgs = document.querySelectorAll('.msg.ai');
                msgs[msgs.length - 1].innerText = res.data.summary || res.data;
            }
        }

        // 发送普通对话 (支持流式输出的预留)
        async function sendChatMessage() {
            const inputEl = document.getElementById('ai-input');
            const text = inputEl.value.trim();
            if (!text) return;

            appendMessage('user', text);
            inputEl.value = '';
            appendMessage('ai', '思考中...');

            // 注意：如果你的 /api/ai/chat 是 SSE 流式接口，这里需要用 fetch 直接处理流。
            // 这里暂且按普通 JSON 请求模拟，如果你需要对接 SSE 流式，可以后续替换此处逻辑。
            const res = await fetchAPI('/api/ai/chat', {
                method: 'POST',
                body: JSON.stringify({ query: text })
            });

            const msgs = document.querySelectorAll('.msg.ai');
            if (res && res.data) {
                msgs[msgs.length - 1].innerText = res.data.answer || res.data;
            } else {
                msgs[msgs.length - 1].innerText = "抱歉，大模型请求出错了。";
            }
        }

        // 监听回车发送
        document.getElementById('ai-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });

        // 页面加载完成后检查登录状态
        window.onload = checkAuthAndInit;

    </script>
</body>
</html>
